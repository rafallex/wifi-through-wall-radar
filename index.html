<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi-Radar · Human-Sensing Dashboard</title>
<style>
  :root{
    --bg:#04080a; --panel:#070e12; --line:#0e2128;
    --cyan:#29f3c3; --green:#37e06a; --amber:#ffb454; --red:#ff5a6a;
    --txt:#7fe9cf; --dim:#3f6f68; --white:#d7fff4;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    overflow:hidden;letter-spacing:.4px;
    background-image:radial-gradient(circle at 30% 0%,#0a1c1f 0,transparent 55%),
                     radial-gradient(circle at 90% 100%,#0a181f 0,transparent 50%);}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:99;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 1px,transparent 1px 3px);
    mix-blend-mode:multiply;opacity:.5}
  .app{height:100vh;display:flex;flex-direction:column;padding:14px;gap:12px}
  header{display:flex;align-items:center;gap:14px;border:1px solid var(--line);
    background:linear-gradient(180deg,#08151a,#050c0f);padding:10px 16px;border-radius:8px}
  .logo{font-weight:700;color:var(--white);font-size:19px;text-shadow:0 0 14px var(--cyan)}
  .logo b{color:var(--cyan)}
  .sub{color:var(--dim);font-size:11px;text-transform:uppercase}
  .badge{font-size:10px;border:1px solid var(--amber);color:var(--amber);
    padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
  .badge.live{border-color:var(--green);color:var(--green);box-shadow:0 0 12px rgba(55,224,106,.3)}
  .modes{display:flex;gap:5px;margin-left:4px}
  .modes button{background:#06141a;color:var(--dim);border:1px solid var(--line);
    font-family:inherit;font-size:10px;text-transform:uppercase;letter-spacing:1px;
    padding:5px 10px;border-radius:5px;cursor:pointer}
  .modes button:hover{color:var(--txt)}
  .modes button.on{color:var(--cyan);border-color:var(--cyan);background:#0a2024;box-shadow:0 0 10px rgba(41,243,195,.25)}
  .spacer{flex:1}
  .live{display:flex;align-items:center;gap:7px;color:var(--red);font-size:12px;font-weight:700}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 10px var(--red);animation:blink 1.1s infinite}
  @keyframes blink{50%{opacity:.25}}
  .clock{color:var(--white);font-size:13px;min-width:92px;text-align:right}
  main{flex:1;display:grid;grid-template-columns:1.25fr 1fr 0.95fr;gap:12px;min-height:0}
  .panel{border:1px solid var(--line);background:var(--panel);border-radius:8px;
    display:flex;flex-direction:column;min-height:0;position:relative;overflow:hidden}
  .panel::before{content:"";position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 60px rgba(41,243,195,.05)}
  .ph{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;
    border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--cyan)}
  .ph .tag{color:var(--dim)}
  .pb{flex:1;position:relative;min-height:0}
  canvas{display:block;width:100%;height:100%}
  .stats{padding:12px;display:flex;flex-direction:column;gap:10px;height:100%}
  .big{display:flex;align-items:baseline;gap:10px}
  .big .n{font-size:46px;font-weight:700;color:var(--white);line-height:1;text-shadow:0 0 18px var(--green)}
  .big .l{color:var(--dim);font-size:11px;text-transform:uppercase}
  .targets{display:flex;flex-direction:column;gap:7px;overflow:auto;flex:1}
  .t{border:1px solid var(--line);border-left:3px solid var(--green);border-radius:5px;padding:7px 9px;background:#06120f;font-size:11px}
  .t .top{display:flex;justify-content:space-between;color:var(--white);font-weight:700}
  .t .row{display:flex;justify-content:space-between;color:var(--dim);margin-top:3px}
  .t .row b{color:var(--txt);font-weight:400}
  .t.moving{border-left-color:var(--amber)}
  .t.moving .top span:last-child{color:var(--amber)}
  .t.note{border-left-color:var(--dim);color:var(--dim);font-style:italic}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .m{border:1px solid var(--line);border-radius:5px;padding:7px 9px;background:#06120f}
  .m .l{color:var(--dim);font-size:9px;text-transform:uppercase}
  .m .v{color:var(--white);font-size:16px;margin-top:2px}
  .wave{height:74px;border:1px solid var(--line);border-radius:5px;background:#05100d;position:relative}
  .wave .cap{position:absolute;top:4px;left:7px;font-size:9px;color:var(--dim);z-index:2;text-transform:uppercase}
  footer{border:1px solid var(--line);background:#050c0f;border-radius:8px;padding:7px 14px;font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden}
  footer span{display:inline-block;animation:scroll 34s linear infinite;padding-left:100%}
  @keyframes scroll{to{transform:translateX(-100%)}}
  b.c{color:var(--cyan)} b.g{color:var(--green)} b.a{color:var(--amber)}
  #status{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;text-align:center;color:var(--dim);font-size:12px;background:rgba(4,8,10,.88);z-index:5;padding:24px;line-height:1.5}
  #status .hdr{color:var(--cyan);font-size:13px;text-transform:uppercase;letter-spacing:2px}
  #status code{color:var(--green);background:#0a1c1f;padding:2px 6px;border-radius:4px}
  video{display:none}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><b>◢</b> WIFI&#8209;<b>RADAR</b></div>
    <div class="sub">Human Sensing</div>
    <div class="modes">
      <button id="bSim" onclick="selectMode('sim')">Sim</button>
      <button id="bLive" onclick="selectMode('live')">Camera</button>
      <button id="bCsi" onclick="selectMode('csi')">CSI</button>
    </div>
    <span class="badge" id="mode">Booting</span>
    <div class="spacer"></div>
    <div class="live"><span class="dot"></span>LIVE</div>
    <div class="clock" id="clock">--:--:--</div>
  </header>

  <main>
    <section class="panel">
      <div class="ph"><span id="leftTitle">Sensor View</span><span class="tag" id="fpTag">—</span></div>
      <div class="pb">
        <video id="cam" playsinline muted></video>
        <canvas id="floor"></canvas>
        <div id="status">
          <div class="hdr" id="stHdr">Initialising</div>
          <div id="stMsg">Loading…</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="ph"><span id="radarTitle">Doppler Radar</span><span class="tag" id="radarTag">range 6.0 m</span></div>
      <div class="pb"><canvas id="radar"></canvas></div>
    </section>

    <section class="panel">
      <div class="ph"><span>Detections</span><span class="tag" id="srcTag">—</span></div>
      <div class="stats">
        <div class="big"><span class="n" id="count">0</span><span class="l" id="countL">humans<br>detected</span></div>
        <div class="targets" id="targets"></div>
        <div class="wave"><span class="cap" id="waveCap">CSI amplitude · subcarrier 26</span><canvas id="csi"></canvas></div>
        <div class="metrics">
          <div class="m"><div class="l">RSSI</div><div class="v" id="rssi">-42 dBm</div></div>
          <div class="m"><div class="l" id="subL">Subcarriers</div><div class="v" id="subV">52</div></div>
          <div class="m"><div class="l">Motion idx</div><div class="v" id="motion">0.00</div></div>
          <div class="m"><div class="l" id="ppsL">Packets/s</div><div class="v" id="pps">0</div></div>
        </div>
      </div>
    </section>
  </main>
  <footer><span id="ticker"></span></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
"use strict";
const $=id=>document.getElementById(id);
const TAU=Math.PI*2, rand=(a,b)=>a+Math.random()*(b-a), clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const cssv=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
function fit(cv){const r=cv.parentElement.getBoundingClientRect(),d=window.devicePixelRatio||1;
  cv.width=r.width*d;cv.height=r.height*d;const c=cv.getContext('2d');c.setTransform(d,0,0,d,0,0);return[c,r.width,r.height];}

let MODE='init', motionIdx=0, pps=0;
let humans=[];                 // sim / live
const MAXR=6;
const csi={present:false,motion:0,rssi:-42,pps:0,sub:[],ws:null,connected:false,last:0,rings:[]};

/* ===================== SIM SOURCE ===================== */
const W=9,H=8, ROUTER={x:1.1,y:1.0};
const WALLS=[[0,0,W,0],[W,0,W,H],[W,H,0,H],[0,H,0,0],
  [4.6,0,4.6,2.6],[4.6,3.7,4.6,H],[0,4.4,2.0,4.4],[3.0,4.4,4.6,4.4],[4.6,4.4,6.6,4.4],[7.6,4.4,W,4.4]];
const ROOMS=[{n:"Living Rm",x:.2,y:.2,w:4.2,h:4},{n:"Kitchen",x:4.8,y:.2,w:4,h:4},
  {n:"Bedroom",x:.2,y:4.6,w:4.2,h:3.2},{n:"Office",x:4.8,y:4.6,w:4,h:3.2}];
const roomAt=(x,y)=>{for(const r of ROOMS)if(x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h)return r.n;return"Hallway";};
const wp=()=>({x:rand(.6,W-.6),y:rand(.6,H-.6)});
function makeSim(i){const p=wp();return{id:"H"+String(i+1).padStart(2,'0'),_x:p.x,_y:p.y,tx:p.x,ty:p.y,
  v:rand(.18,.5),conf:rand(.7,.95),moving:true,idle:0,hue:[150,165,135][i%3],trail:[],ang:0,rng:0,label:""};}
let nextChange=0;
function simCount(n){while(humans.length<n)humans.push(makeSim(humans.length));humans.length=n;}
function simStep(dt,now){let tot=0;
  for(const h of humans){const dx=h.tx-h._x,dy=h.ty-h._y,d=Math.hypot(dx,dy);
    if(d<0.12){h.moving=false;h.idle-=dt;if(h.idle<=0){const w=wp();h.tx=w.x;h.ty=w.y;h.moving=true;h.v=rand(.18,.5);}}
    else{h.idle=rand(.6,2.2);const s=h.v*dt;h._x+=dx/d*s;h._y+=dy/d*s;tot+=h.v;}
    h._x=clamp(h._x,.3,W-.3);h._y=clamp(h._y,.3,H-.3);h.conf=clamp(h.conf+rand(-.03,.03),.55,.98);
    h.trail.push({x:h._x,y:h._y});if(h.trail.length>40)h.trail.shift();
    const rdx=h._x-ROUTER.x,rdy=h._y-ROUTER.y;h.ang=Math.atan2(rdy,rdx);h.rng=clamp(Math.hypot(rdx,rdy)/9,0,1);h.label=roomAt(h._x,h._y);}
  motionIdx=motionIdx*0.9+(tot/Math.max(1,humans.length))*0.2;pps=Math.round(rand(180,260)+motionIdx*120);
  if(now>nextChange){nextChange=now+rand(7000,15000);simCount(Math.round(rand(2,4)));}}

/* ===================== CAMERA SOURCE ===================== */
let model=null, video=$('cam'), lastDet=[], detBusy=false, lastMotion=0, fps=0,frameC=0,frameT=0,camStream=null;
async function startCamera(){
  setStatus("Requesting camera","Allow camera access to drive the radar with real people.");
  try{ camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:640,height:480},audio:false}); }
  catch(e){ toast("Camera blocked. Try again, or use Sim / CSI."); selectMode('sim'); return; }
  video.srcObject=camStream; await video.play();
  if(!model){ setStatus("Loading detector","Fetching the person-detection model…");
    try{ model=await cocoSsd.load({base:'lite_mobilenet_v2'}); }catch(e){ toast("Detector failed to load."); selectMode('sim'); return; } }
  MODE='live'; setBadge('Live · Camera',true);
  $('leftTitle').textContent='Live Camera · Person Detection';$('fpTag').textContent='computer vision';
  $('radarTitle').textContent='Doppler Radar';$('radarTag').textContent='range 6.0 m';
  $('srcTag').textContent='webcam';$('ppsL').textContent='Frames/s';$('countL').innerHTML='humans<br>detected';
  $('subL').textContent='Subcarriers';$('subV').textContent='52';
  hideStatus(); humans=[]; detectLoop();
}
async function detectLoop(){
  if(MODE!=='live')return;
  if(model && video.readyState===4 && !detBusy){detBusy=true;
    try{lastDet=await model.detect(video,8,0.45);}catch(e){}detBusy=false;syncHumans();}
  frameC++;const now=performance.now();if(now-frameT>1000){fps=frameC;frameC=0;frameT=now;}
  setTimeout(()=>requestAnimationFrame(detectLoop),60);
}
function syncHumans(){const persons=lastDet.filter(p=>p.class==='person');
  const vw=video.videoWidth||640,vh=video.videoHeight||480;persons.sort((a,b)=>a.bbox[0]-b.bbox[0]);
  const next=[];let totMove=0;
  persons.forEach((p,i)=>{const[x,y,w,h]=p.bbox;const cxN=1-((x+w/2)/vw);const sizeN=clamp(h/vh,.05,1);
    const rng=clamp(1-sizeN*1.05,.04,1);const ang=-Math.PI/2+(cxN-.5)*1.7;const prev=humans[i];let moving=false;
    if(prev){const dd=Math.hypot(cxN-(prev._cxN||0),sizeN-(prev._sizeN||0));moving=dd>0.012;totMove+=dd;}
    next.push({id:"P"+String(i+1).padStart(2,'0'),ang,rng,conf:p.score,moving,
      label:cxN<.4?"left":cxN>.6?"right":"centre",hue:[150,165,135,180][i%4],box:[x,y,w,h],_cxN:cxN,_sizeN:sizeN});});
  humans=next;lastMotion=lastMotion*0.7+totMove*0.3;motionIdx=clamp(lastMotion*9,0,1.2);pps=fps;}

/* ===================== CSI SOURCE (real ESP32 via WebSocket) ===================== */
function connectCSI(){
  if(csi.ws){try{csi.ws.close();}catch(e){}}
  MODE='csi';setBadge('CSI · connecting…',false);
  $('leftTitle').textContent='CSI Spectrum · Subcarriers';$('fpTag').textContent='esp32 wifi-csi';
  $('radarTitle').textContent='Motion Contact';$('radarTag').textContent='no bearing · 1 antenna';
  $('srcTag').textContent='esp32-csi';$('ppsL').textContent='Packets/s';
  $('countL').innerHTML='RF motion<br>magnitude';$('subL').textContent='Subcarriers';$('waveCap').textContent='RF motion · CSI variance';
  setStatus("Connecting to ESP32 bridge","Run the bridge, then this connects automatically:");
  $('stMsg').innerHTML='Run the bridge, then this connects automatically:<br><br><code>python csi_bridge.py</code><br><br>(mock mode works with no hardware — add <code>--port COM5</code> for a real ESP32)';
  const ws=new WebSocket('ws://127.0.0.1:8765');csi.ws=ws;
  ws.onopen=()=>{csi.connected=true;setBadge('CSI · Live',true);hideStatus();};
  ws.onmessage=ev=>{try{const d=JSON.parse(ev.data);csi.present=!!d.present;csi.motion=+d.motion||0;
    csi.rssi=d.rssi||csi.rssi;csi.pps=d.pps||0;csi.sub=d.sub||[];csi.last=performance.now();motionIdx=csi.motion;}catch(e){}};
  ws.onerror=()=>{};
  ws.onclose=()=>{csi.connected=false;if(MODE==='csi'){setBadge('CSI · no bridge',false);
    setStatus("ESP32 bridge not found","Start it in a terminal:");
    $('stMsg').innerHTML='Start it in a terminal (in the repo folder):<br><br><code>pip install websockets</code><br><code>python csi_bridge.py</code><br><br>Mock mode needs no hardware. Then it reconnects.';
    setTimeout(()=>{if(MODE==='csi'&&!csi.connected)connectCSI();},4000);}};
}

/* ===================== mode switching ===================== */
function setBadge(t,live){const b=$('mode');b.textContent=t;b.classList.toggle('live',!!live);}
function selectMode(m){
  ['bSim','bLive','bCsi'].forEach(id=>$(id).classList.remove('on'));
  $({sim:'bSim',live:'bLive',csi:'bCsi'}[m]).classList.add('on');
  if(MODE!=='live'&&camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  if(m!=='csi'&&csi.ws){try{csi.ws.close();}catch(e){}csi.ws=null;}
  if(m==='sim')fallbackSim();
  else if(m==='live')startCamera();
  else if(m==='csi')connectCSI();
}
function fallbackSim(msg){MODE='sim';setBadge('Simulation',false);
  $('leftTitle').textContent='Floorplan · Reflection Map';$('fpTag').textContent='2.4GHz · ch 6';
  $('radarTitle').textContent='Doppler Radar';$('radarTag').textContent='range 9.0 m';
  $('srcTag').textContent='synthetic';$('ppsL').textContent='Packets/s';$('countL').innerHTML='humans<br>detected';
  $('subL').textContent='Subcarriers';$('subV').textContent='52';$('waveCap').textContent='CSI amplitude · subcarrier 26';
  simCount(3);hideStatus();if(msg)toast(msg);}
function toast(m){setStatus("Notice",m);setTimeout(()=>{if(MODE==='sim')hideStatus();},4200);}
function setStatus(h,m){$('status').style.display='flex';$('stHdr').textContent=h;$('stMsg').textContent=m;}
function hideStatus(){$('status').style.display='none';}

/* ===================== render: left panel ===================== */
const fc=$('floor');
function drawSim(now){const[c,FW,FH]=fit(fc);
  const pad=24,s=Math.min((FW-pad*2)/W,(FH-pad*2)/H),ox=(FW-W*s)/2,oy=(FH-H*s)/2;
  const X=x=>ox+x*s,Y=y=>oy+y*s;c.clearRect(0,0,FW,FH);
  c.strokeStyle="rgba(41,243,195,.06)";c.lineWidth=1;
  for(let x=0;x<=W;x++){c.beginPath();c.moveTo(X(x),Y(0));c.lineTo(X(x),Y(H));c.stroke();}
  for(let y=0;y<=H;y++){c.beginPath();c.moveTo(X(0),Y(y));c.lineTo(X(W),Y(y));c.stroke();}
  c.fillStyle="rgba(63,111,104,.7)";c.font="11px ui-monospace";c.textAlign="left";
  for(const r of ROOMS)c.fillText(r.n.toUpperCase(),X(r.x)+6,Y(r.y)+16);
  c.strokeStyle="#1f5a52";c.lineWidth=3;c.lineCap="round";c.shadowBlur=8;c.shadowColor="rgba(41,243,195,.4)";
  for(const w of WALLS){c.beginPath();c.moveTo(X(w[0]),Y(w[1]));c.lineTo(X(w[2]),Y(w[3]));c.stroke();}c.shadowBlur=0;
  for(const h of humans){const g=c.createLinearGradient(X(ROUTER.x),Y(ROUTER.y),X(h._x),Y(h._y));
    g.addColorStop(0,"rgba(41,243,195,.45)");g.addColorStop(1,"rgba(55,224,106,.05)");
    c.strokeStyle=g;c.lineWidth=1;c.setLineDash([5,6]);c.lineDashOffset=-(now/40)%11;
    c.beginPath();c.moveTo(X(ROUTER.x),Y(ROUTER.y));c.lineTo(X(h._x),Y(h._y));c.stroke();}c.setLineDash([]);
  const pr=((now/12)%140)/140;c.strokeStyle=`rgba(41,243,195,${(1-pr)*.5})`;c.lineWidth=2;
  c.beginPath();c.arc(X(ROUTER.x),Y(ROUTER.y),6+pr*70,0,TAU);c.stroke();
  c.fillStyle=cssv("--cyan");c.shadowBlur=14;c.shadowColor=cssv("--cyan");
  c.beginPath();c.arc(X(ROUTER.x),Y(ROUTER.y),5,0,TAU);c.fill();c.shadowBlur=0;
  c.fillStyle="#7fe9cf";c.font="9px ui-monospace";c.fillText("ROUTER",X(ROUTER.x)+9,Y(ROUTER.y)+3);
  for(const h of humans){for(let i=0;i<h.trail.length;i++){const p=h.trail[i],a=i/h.trail.length*.4;
      c.fillStyle=`hsla(${h.hue},80%,55%,${a})`;c.beginPath();c.arc(X(p.x),Y(p.y),2,0,TAU);c.fill();}
    const col=`hsl(${h.hue},85%,${h.moving?60:48}%)`;c.shadowBlur=18;c.shadowColor=col;c.fillStyle=col;
    c.beginPath();c.arc(X(h._x),Y(h._y),7,0,TAU);c.fill();c.shadowBlur=0;
    c.fillStyle=col;c.textAlign="left";c.font="9px ui-monospace";c.fillText(`${h.id} ${(h.conf*100|0)}%`,X(h._x)+10,Y(h._y)-7);}}
function drawCam(){const[c,FW,FH]=fit(fc);c.clearRect(0,0,FW,FH);
  const vw=video.videoWidth||640,vh=video.videoHeight||480,s=Math.min(FW/vw,FH/vh),dw=vw*s,dh=vh*s,ox=(FW-dw)/2,oy=(FH-dh)/2;
  c.save();c.translate(ox+dw,oy);c.scale(-1,1);c.globalAlpha=.92;c.drawImage(video,0,0,dw,dh);c.globalAlpha=1;c.restore();
  for(const h of humans){if(!h.box)continue;let[x,y,w,hh]=h.box;const bx=ox+(vw-(x+w))*s,by=oy+y*s,bw=w*s,bh=hh*s;
    const col=`hsl(${h.hue},90%,60%)`;c.strokeStyle=col;c.lineWidth=2;c.shadowBlur=12;c.shadowColor=col;c.strokeRect(bx,by,bw,bh);c.shadowBlur=0;
    c.fillStyle=col;c.font="10px ui-monospace";c.textAlign="left";c.fillText(`${h.id} · ${(h.conf*100|0)}%`,bx+2,by-4);}
  c.fillStyle="rgba(55,224,106,.8)";c.font="10px ui-monospace";c.textAlign="left";
  c.fillText("● REC  webcam stays in your browser — nothing uploaded",ox+8,oy+dh-8);}
function drawCsiSensor(){const[c,FW,FH]=fit(fc);c.clearRect(0,0,FW,FH);
  const sub=csi.sub.length?csi.sub:new Array(52).fill(0);const n=sub.length;
  const mx=Math.max(1,...sub);const pad=30,bw=(FW-pad*2)/n,base=FH-60;
  c.fillStyle="rgba(63,111,104,.8)";c.font="10px ui-monospace";c.textAlign="left";
  c.fillText("CSI AMPLITUDE PER SUBCARRIER",pad,28);
  for(let i=0;i<n;i++){const v=sub[i]/mx,bh=v*(base-50);const x=pad+i*bw;
    const col=csi.present?`hsl(${40-v*20},90%,55%)`:`hsl(${160},80%,${35+v*25}%)`;
    c.fillStyle=col;c.shadowBlur=6;c.shadowColor=col;c.fillRect(x,base-bh,Math.max(1,bw-1.5),bh);c.shadowBlur=0;}
  c.strokeStyle="rgba(41,243,195,.15)";c.beginPath();c.moveTo(pad,base);c.lineTo(FW-pad,base);c.stroke();
  // motion gauge
  const gy=base+22,gw=FW-pad*2;c.fillStyle="rgba(63,111,104,.8)";c.font="10px ui-monospace";
  c.fillText("MOTION",pad,gy-6);c.textAlign="right";c.fillText(csi.present?"● PRESENT":"○ CLEAR",FW-pad,gy-6);c.textAlign="left";
  c.strokeStyle="var(--line)";c.strokeStyle="#0e2128";c.strokeRect(pad,gy,gw,12);
  const col=csi.motion>.12?cssv("--amber"):cssv("--green");c.fillStyle=col;c.shadowBlur=10;c.shadowColor=col;
  c.fillRect(pad,gy,gw*clamp(csi.motion,0,1),12);c.shadowBlur=0;}

/* ===================== render: radar ===================== */
const rc=$('radar');let sweep=0;
function drawRadar(now,dt){const[c,w,h]=fit(rc);const cx=w/2,cy=h/2,R=Math.min(w,h)/2-14;c.clearRect(0,0,w,h);
  c.strokeStyle="rgba(41,243,195,.18)";c.lineWidth=1;
  for(let i=1;i<=4;i++){c.beginPath();c.arc(cx,cy,R*i/4,0,TAU);c.stroke();}
  c.beginPath();c.moveTo(cx-R,cy);c.lineTo(cx+R,cy);c.moveTo(cx,cy-R);c.lineTo(cx,cy+R);c.stroke();
  c.fillStyle="rgba(63,111,104,.8)";c.font="8px ui-monospace";c.textAlign="left";
  for(let i=1;i<=4;i++)c.fillText((i/4*MAXR).toFixed(1)+"m",cx+4,cy-R*i/4+10);
  sweep=(sweep+dt*1.6)%TAU;c.save();c.translate(cx,cy);
  for(let i=0;i<48;i++){const a=sweep-i*0.022;c.strokeStyle=`rgba(55,224,106,${.32*(1-i/48)})`;c.lineWidth=2;
    c.beginPath();c.moveTo(0,0);c.lineTo(Math.cos(a)*R,Math.sin(a)*R);c.stroke();}c.restore();
  for(const hm of humans){const rr=hm.rng*R,bx=cx+Math.cos(hm.ang)*rr,by=cy+Math.sin(hm.ang)*rr;
    let da=(sweep-hm.ang)%TAU;if(da<0)da+=TAU;const fade=clamp(1-da/TAU*1.3,0,1);const col=`hsl(${hm.hue},90%,60%)`;
    c.globalAlpha=.35+fade*.65;c.shadowBlur=14;c.shadowColor=col;c.fillStyle=col;c.beginPath();c.arc(bx,by,5+fade*3,0,TAU);c.fill();
    c.globalAlpha=1;c.shadowBlur=0;c.strokeStyle=`hsla(${hm.hue},90%,60%,${.25+fade*.4})`;c.lineWidth=1;c.beginPath();c.arc(bx,by,10,0,TAU);c.stroke();
    c.fillStyle=col;c.font="8px ui-monospace";c.fillText(hm.id,bx+9,by+3);}
  c.globalAlpha=1;c.fillStyle=cssv("--cyan");c.beginPath();c.arc(cx,cy,3,0,TAU);c.fill();}
function drawRadarCsi(now,dt){const[c,w,h]=fit(rc);const cx=w/2,cy=h/2,R=Math.min(w,h)/2-14;c.clearRect(0,0,w,h);
  c.strokeStyle="rgba(41,243,195,.12)";c.lineWidth=1;
  for(let i=1;i<=4;i++){c.beginPath();c.arc(cx,cy,R*i/4,0,TAU);c.stroke();}
  // spawn expanding rings at a rate proportional to motion
  if(csi.motion>0.06 && (!csi.rings.length || csi.rings[csi.rings.length-1].r>R*0.12*(1.2-csi.motion)))
    csi.rings.push({r:0,m:csi.motion});
  csi.rings=csi.rings.filter(rg=>{rg.r+=dt*R*(0.5+rg.m*1.2);
    const a=clamp(1-rg.r/R,0,1)*clamp(rg.m,0,1);const col=rg.m>.12?cssv("--amber"):cssv("--green");
    c.strokeStyle=col;c.globalAlpha=a;c.lineWidth=2;c.beginPath();c.arc(cx,cy,rg.r,0,TAU);c.stroke();c.globalAlpha=1;
    return rg.r<R;});
  // centre contact
  const present=csi.present,col=present?cssv("--amber"):cssv("--green");
  const pulse=1+0.3*Math.sin(now/120)*csi.motion;
  c.shadowBlur=10+csi.motion*30;c.shadowColor=col;c.fillStyle=col;
  c.beginPath();c.arc(cx,cy,(6+csi.motion*16)*pulse,0,TAU);c.fill();c.shadowBlur=0;
  c.fillStyle=present?cssv("--amber"):cssv("--dim");c.font="11px ui-monospace";c.textAlign="center";
  c.fillText(present?"CONTACT":"CLEAR",cx,cy+R*0.55);
  c.fillStyle="rgba(63,111,104,.85)";c.font="9px ui-monospace";
  c.fillText("MOTION MAGNITUDE — single antenna, no bearing",cx,cy+R*0.72);}

/* ===================== render: CSI waveform + stats ===================== */
const csiW=$('csi');const buf=new Array(220).fill(0);
function drawCSI(){const[c,w,h]=fit(csiW);c.clearRect(0,0,w,h);
  buf.push(Math.sin(performance.now()/120)*0.3+(Math.random()-.5)*(0.15+motionIdx*0.9));if(buf.length>220)buf.shift();
  c.strokeStyle="rgba(41,243,195,.10)";for(let y=0;y<h;y+=h/4){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  c.beginPath();c.lineWidth=1.6;c.strokeStyle=cssv("--green");c.shadowBlur=8;c.shadowColor=cssv("--green");
  for(let i=0;i<buf.length;i++){const x=i/(buf.length-1)*w,y=h/2-buf[i]*h*0.42;i?c.lineTo(x,y):c.moveTo(x,y);}c.stroke();c.shadowBlur=0;}
function drawStats(){$('count').textContent=humans.length;$('rssi').textContent=(-42-(motionIdx*6|0))+" dBm";
  $('motion').textContent=motionIdx.toFixed(2);$('pps').textContent=pps;$('subV').textContent=52;
  const box=$('targets');box.innerHTML="";
  for(const h of humans){const el=document.createElement('div');el.className="t"+(h.moving?" moving":"");
    el.innerHTML=`<div class="top"><span>${h.id}</span><span>${h.moving?"MOVING":"STILL"}</span></div>
      <div class="row"><span>${MODE==='live'?'bearing':'room'}</span><b>${h.label}</b></div>
      <div class="row"><span>range</span><b>${(h.rng*MAXR).toFixed(2)} m</b></div>
      <div class="row"><span>confidence</span><b>${(h.conf*100).toFixed(0)}%</b></div>`;box.appendChild(el);}}
function drawStatsCsi(){
  $('count').textContent=Math.round(csi.motion*100);
  $('rssi').textContent=csi.rssi+" dBm";$('motion').textContent=csi.motion.toFixed(2);
  $('pps').textContent=csi.pps;$('subV').textContent=csi.sub.length||0;
  const box=$('targets');box.innerHTML="";
  const el=document.createElement('div');el.className="t"+(csi.present?" moving":"");
  el.innerHTML=`<div class="top"><span>PRESENCE</span><span>${csi.present?"DETECTED":"CLEAR"}</span></div>
    <div class="row"><span>motion</span><b>${(csi.motion*100).toFixed(0)}%</b></div>
    <div class="row"><span>link</span><b>${csi.connected?"esp32 · live":"no bridge"}</b></div>`;box.appendChild(el);
  const note=document.createElement('div');note.className="t note";
  note.textContent="single-antenna CSI: presence + motion only — no position or count.";box.appendChild(note);}

/* ===================== clock + ticker + loop ===================== */
function tick(){$('clock').textContent=new Date().toTimeString().slice(0,8);}
$('ticker').innerHTML='<b class="g">SIM</b> synthetic agents · <b class="c">CAMERA</b> your webcam + COCO-SSD person detection (computer vision, video stays local) · '+
 '<b class="a">CSI</b> real ESP32 WiFi Channel-State-Information over a WebSocket — honest presence + motion magnitude, NOT location. &nbsp;•&nbsp; '+
 'run <code>python csi_bridge.py</code> for the CSI source (mock mode needs no hardware). &nbsp;•&nbsp; through real walls needs WiFi CSI: ESP32-CSI, Nexmon, DensePose-From-WiFi. &nbsp;•&nbsp; ';

let last=performance.now();
function loop(now){const dt=Math.min(.05,(now-last)/1000);last=now;
  if(MODE==='sim')simStep(dt,now);
  if(MODE==='csi'&&csi.connected&&now-csi.last>1500){csi.motion*=0.9;motionIdx=csi.motion;} // decay if stream stalls
  if(MODE==='live')drawCam();else if(MODE==='csi')drawCsiSensor();else drawSim(now);
  if(MODE==='csi')drawRadarCsi(now,dt);else drawRadar(now,dt);
  drawCSI();
  if(MODE==='csi')drawStatsCsi();else drawStats();
  requestAnimationFrame(loop);}

async function init(){tick();setInterval(tick,1000);requestAnimationFrame(loop);
  // default: try camera, else sim. (CSI is opt-in via the button.)
  if(window.cocoSsd && navigator.mediaDevices && location.protocol!=='file:'){selectMode('live');}
  else{selectMode('sim');}
}
init();
</script>
</body>
